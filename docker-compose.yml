version: "3.9"

services:
  # Default PostgreSQL instance (docker compose up -d database)
  database:
    image: postgres:16
    container_name: clean-arch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_POSTGRES_DB:-app}
      POSTGRES_USER: ${APP_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD:-app}
    ports:
      - "${APP_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - clean_arch

  # Optional MySQL instance (docker compose --profile mysql up -d mysql)
  mysql:
    image: mysql:8.2
    container_name: clean-arch-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${APP_MYSQL_DB:-app}
      MYSQL_USER: ${APP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${APP_MYSQL_PASSWORD:-app}
      MYSQL_ROOT_PASSWORD: ${APP_MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${APP_MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - clean_arch
    profiles:
      - mysql

  # Optional MongoDB instance (docker compose --profile mongo up -d mongo)
  mongo:
    image: mongo:7
    container_name: clean-arch-mongo
    restart: unless-stopped
    ports:
      - "${APP_MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${APP_MONGO_DATABASE:-app}
      MONGO_INITDB_ROOT_USERNAME: ${APP_MONGO_USER:-app}
      MONGO_INITDB_ROOT_PASSWORD: ${APP_MONGO_PASSWORD:-app}
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db
    networks:
      - clean_arch
    profiles:
      - mongo

  # Migration helper (docker compose --profile migrate run --rm migrator)
  migrator:
    image: migrate/migrate:v4.17.1
    container_name: clean-arch-migrator
    entrypoint: ["/bin/sh", "-c"]
    command: "${MIGRATION_CMD:-echo \"Set MIGRATION_CMD to run migrations\"}"
    volumes:
      - ./db/migrations:/migrations
    networks:
      - clean_arch
    depends_on:
      database:
        condition: service_healthy
    profiles:
      - migrate

networks:
  clean_arch:
    driver: bridge

volumes:
  postgres-data:
  mysql-data:
  mongo-data:
